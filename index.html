<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuturON Preschool - Student Daily Updates</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #e5e7eb;
            min-height: 100vh;
        }
        
        /* Layout */
        .app { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px;
            background: #0d1117;
            border-right: 1px solid #1a1f2e;
            padding: 1.5rem 1rem;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }
        .main { margin-left: 240px; flex: 1; padding: 2rem; }
        
        /* Sidebar */
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
        .logo-icon { width: 36px; height: 36px; background: #6C63FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .logo-text { font-weight: 600; font-size: 0.9rem; }
        .logo-sub { color: #6b7280; font-size: 0.7rem; }
        
        .nav-category { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 0 0.5rem; font-weight: 600; }
        .nav-item { padding: 0.5rem 0.8rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; color: #9ca3af; margin-bottom: 2px; transition: all 0.2s; }
        .nav-item:hover { background: #1a1f2e; color: #ffffff; }
        .nav-item.active { background: #1a1040; color: #8b5cf6; border-left: 3px solid #8b5cf6; }
        
        /* Header */
        .school-banner {
            background: linear-gradient(135deg, #1a1040 0%, #2d1b69 50%, #1a1040 100%);
            border: 1px solid #3b2580;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .school-banner::before {
            content: '';
            position: absolute;
            top: -50%; right: -20%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .school-banner-left { display: flex; align-items: center; gap: 14px; z-index: 1; }
        .school-logo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(139,92,246,0.5); box-shadow: 0 0 12px rgba(139,92,246,0.3); }
        .school-name { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: 0.02em; }
        .school-address { font-size: 0.72rem; color: #a78bfa; margin-top: 2px; }
        .school-badge { z-index: 1; text-align: right; }
        .school-badge-class { font-size: 0.75rem; color: #c4b5fd; font-weight: 600; background: rgba(139,92,246,0.2); padding: 3px 10px; border-radius: 20px; display: inline-block; }
        .school-badge-date { font-size: 0.65rem; color: #6b7280; margin-top: 4px; }

        .header { display: flex; gap: 1.2rem; margin-bottom: 2rem; align-items: stretch; }
        .student-profile-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #111827, #1a1040);
            border: 1px solid #2d1b69;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            min-width: 130px;
        }
        .student-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 3px solid #8b5cf6; box-shadow: 0 0 16px rgba(139,92,246,0.4); }
        .student-avatar-placeholder { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; color: #fff; border: 3px solid #8b5cf6; box-shadow: 0 0 16px rgba(139,92,246,0.4); }
        .student-profile-name { font-size: 0.75rem; color: #c4b5fd; margin-top: 8px; font-weight: 600; text-transform: capitalize; }
        .greeting-card {
            flex: 1;
            background: linear-gradient(135deg, #111827, #1a1040);
            border: 1px solid #2d1b69;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            display: flex; flex-direction: column; justify-content: center;
        }
        .greeting-title { font-size: 1.3rem; font-weight: 600; color: #fff; }
        .greeting-subtitle { font-size: 0.82rem; color: #9ca3af; margin-top: 0.3rem; }
        .progress-line { height: 4px; width: 200px; border-radius: 2px; background: linear-gradient(90deg, #8b5cf6 60%, #1f2937 60%); margin-top: 1rem; }
        
        .health-card { text-align: center; padding: 1rem 1.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #111827, #0d2818); border: 1px solid #065f46; border-radius: 16px; min-width: 110px; }
        .health-value { font-size: 2.5rem; font-weight: 700; color: #10b981; }
        .health-label { font-size: 0.7rem; color: #9ca3af; text-transform: uppercase; margin-top: 0.2rem; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.3rem; }
        .badge-green { background: #064e3b; color: #6ee7b7; }
        .badge-yellow { background: #78350f; color: #fcd34d; }
        .badge-purple { background: #3b0764; color: #c4b5fd; }
        
        /* Section headers */
        .section-header { font-size: 0.7rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 0 0.8rem; font-weight: 600; }
        
        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .kpi-card { background: linear-gradient(135deg, #111827, #1a1f3a); border: 1px solid #1f2937; border-radius: 12px; padding: 1.2rem; text-align: center; }
        .kpi-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.6rem; }
        .kpi-label { font-size: 0.7rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
        .kpi-value { font-size: 2rem; font-weight: 700; margin: 0.3rem 0; }
        .kpi-sublabel { font-size: 0.65rem; color: #6b7280; }
        .border-purple { border-bottom: 3px solid #8b5cf6; }
        .border-green { border-bottom: 3px solid #10b981; }
        .border-blue { border-bottom: 3px solid #3b82f6; }
        .border-orange { border-bottom: 3px solid #f59e0b; }
        .accent-purple { color: #8b5cf6; }
        .accent-green { color: #10b981; }
        .accent-blue { color: #3b82f6; }
        .accent-orange { color: #f59e0b; }
        
        /* Student progress bars */
        .student-progress { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 1.2rem; margin-bottom: 1.5rem; }
        .student-row { margin-bottom: 1rem; }
        .student-row.active { border-left: 3px solid #8b5cf6; padding-left: 8px; }
        .student-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
        .student-name { font-weight: 600; font-size: 0.85rem; }
        .student-overall { color: #9ca3af; font-size: 0.75rem; }
        .bars-row { display: flex; gap: 6px; }
        .bar-group { flex: 1; }
        .bar-label { font-size: 0.6rem; margin-bottom: 2px; }
        .bar-track { height: 6px; border-radius: 3px; background: #1f2937; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; }
        
        /* Day-wise table */
        .day-table { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 1.2rem; margin-bottom: 1.5rem; }
        .day-table-header { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 8px; padding-bottom: 0.5rem; border-bottom: 1px solid #1f2937; margin-bottom: 0.5rem; }
        .day-table-header span { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .day-table-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 8px; padding: 0.6rem 0; border-bottom: 1px solid #111827; }
        .day-cell-name { font-weight: 600; font-size: 0.85rem; color: #fff; }
        .day-cell-time { font-size: 0.7rem; color: #6b7280; }
        .day-cell-pct { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .pct-bar { height: 5px; border-radius: 3px; background: #1f2937; margin-top: 4px; overflow: hidden; }
        .pct-bar-fill { height: 100%; border-radius: 3px; }
        
        /* Daily snapshot */
        .snapshot-row { display: grid; grid-template-columns: 1.2fr 2fr 2fr 2fr 1fr; gap: 12px; padding: 0.8rem 0; border-bottom: 1px solid #1f2937; align-items: center; }
        .snap-day { font-size: 0.8rem; font-weight: 600; color: #8b5cf6; text-transform: uppercase; }
        .snap-time { font-size: 0.7rem; color: #6b7280; }
        .snap-label { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; }
        .snap-value { font-size: 0.8rem; color: #d1d5db; margin: 0.1rem 0; }
        .snap-bar { height: 4px; border-radius: 2px; background: #1f2937; overflow: hidden; margin-top: 3px; }
        .snap-bar-fill { height: 100%; border-radius: 2px; }
        
        /* View tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: #111827; border-radius: 8px; padding: 4px; display: inline-flex; }
        .tab { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; color: #9ca3af; transition: all 0.2s; }
        .tab.active { background: #8b5cf6; color: #fff; }
        .tab:hover:not(.active) { color: #fff; }
        
        /* AI Insights */
        .ai-card { background: linear-gradient(135deg, #111827, #1a1f3a); border: 1px solid #1f2937; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
        .ai-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0.8rem; font-weight: 600; font-size: 0.9rem; }
        .ai-tip { display: flex; align-items: flex-start; gap: 10px; padding: 0.6rem 0; border-bottom: 1px solid #111827; }
        .ai-tip:last-child { border-bottom: none; }
        .ai-tip-icon { font-size: 1.1rem; flex-shrink: 0; }
        .ai-tip-text { font-size: 0.8rem; color: #d1d5db; line-height: 1.4; }
        .ai-severity-critical { border-left: 3px solid #ef4444; padding-left: 8px; }
        .ai-severity-warning { border-left: 3px solid #f59e0b; padding-left: 8px; }
        .ai-severity-positive { border-left: 3px solid #10b981; padding-left: 8px; }
        .ai-summary-text { font-size: 0.85rem; color: #d1d5db; line-height: 1.6; padding: 0.5rem 0; }
        .ai-prediction-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 8px; padding: 0.6rem 0; border-bottom: 1px solid #111827; align-items: center; }
        .ai-prediction-row:last-child { border-bottom: none; }
        .ai-pred-label { font-size: 0.8rem; font-weight: 600; color: #9ca3af; }
        .ai-pred-bar { height: 8px; border-radius: 4px; background: #1f2937; overflow: hidden; }
        .ai-pred-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .ai-pred-value { font-size: 0.85rem; font-weight: 700; text-align: right; }
        .ai-rec { display: flex; align-items: flex-start; gap: 10px; padding: 0.7rem; border-radius: 8px; margin-bottom: 0.5rem; }
        .ai-rec-urgent { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .ai-rec-important { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); }
        .ai-rec-celebrate { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); }
        .ai-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .ai-badge-urgent { background: #991b1b; color: #fca5a5; }
        .ai-badge-important { background: #78350f; color: #fcd34d; }
        .ai-badge-celebrate { background: #064e3b; color: #6ee7b7; }

        /* Footer */
        .footer { text-align: center; padding: 2rem 0 1rem; border-top: 1px solid #1f2937; margin-top: 2rem; }
        .footer p { color: #6b7280; font-size: 0.7rem; }
        
        /* PDF Download button */
        .pdf-btn { position: fixed; bottom: 1.5rem; right: 1.5rem; background: linear-gradient(135deg, #6C63FF, #8b5cf6); color: #fff; border: none; padding: 0.8rem 1.2rem; border-radius: 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(108,99,255,0.4); z-index: 1000; transition: all 0.2s; }
        .pdf-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(108,99,255,0.5); }
        .pdf-btn svg { flex-shrink: 0; }

        @media print {
            .sidebar, .pdf-btn { display: none !important; }
            .main { margin-left: 0 !important; padding: 0.5rem !important; }
            body { background: #fff !important; color: #111 !important; }
            .greeting-card, .kpi-card, .student-progress, .day-table, .ai-card { background: #f9fafb !important; border-color: #e5e7eb !important; color: #111 !important; }
            .kpi-value, .day-cell-pct, .greeting-title, .student-name, .snap-value { color: #111 !important; }
            .kpi-label, .kpi-sublabel, .greeting-subtitle, .snap-label, .snap-time, .day-cell-time { color: #4b5563 !important; }
            .section-header, .nav-category { color: #374151 !important; }
            .health-value { color: #059669 !important; }
            .bar-track, .pct-bar, .snap-bar, .ai-pred-bar { background: #e5e7eb !important; }
            .footer { border-color: #e5e7eb !important; }
            .footer p { color: #6b7280 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 1rem; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .snapshot-row { grid-template-columns: 1fr; gap: 4px; }
            .day-table-header, .day-table-row { grid-template-columns: 1fr 1fr 1fr 1fr; }
            .mobile-nav { display: flex !important; }
            .school-banner { padding: 0.8rem 1rem; flex-wrap: wrap; gap: 8px; }
            .school-name { font-size: 1rem; }
            .header { flex-direction: column; gap: 0.8rem; }
            .student-profile-card { flex-direction: row; padding: 1rem; gap: 12px; }
            .health-card { flex-direction: row; gap: 10px; padding: 0.8rem 1.2rem; }
            .health-value { font-size: 1.8rem; }
        }
        .mobile-nav { display: none; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
        .mobile-nav select { background: #1f2937; color: #fff; border: 1px solid #374151; border-radius: 8px; padding: 0.5rem 0.8rem; font-size: 0.8rem; appearance: auto; flex: 1; min-width: 0; }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main" id="main"></main>
    </div>
    <button class="pdf-btn" onclick="downloadPDF()" title="Download as PDF">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
    </button>
    <script src="data.js"></script>
    <script src="sheets-fetcher.js"></script>
    <script src="parent-info.js"></script>
    <script src="ai-engine.js"></script>
    <script>
        // Check for parent-specific URL: ?student=NAME
        const urlParams = new URLSearchParams(window.location.search);
        const parentMode = urlParams.get('student');
        let isParentView = parentMode && studentsData[parentMode.toUpperCase()];

        let selectedStudent = isParentView ? parentMode.toUpperCase() : Object.keys(studentsData)[0];
        let selectedWeekIdx = 0;


        const ALL_DAYS = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];

        function getWeekDays(week) {
            return ALL_DAYS.map(dayName => {
                const found = week.days.find(d => d.day === dayName);
                if (found) return found;
                return { day: dayName, arrival_time: 'N/A', snacks: 'N/A', snack_completion: 0, lunch: 'N/A', lunch_completion: 0, interested_in: 'N/A', water_completion: 0, bottle_refill: 0, uniform: 'N/A' };
            });
        }
        function getActiveDays(days) {
            return days.filter(d => !isAbsent(d));
        }

        function pct(val) { return Math.min(Math.round(val * 100), 100); }
        function isAbsent(d) {
            return (d.snacks === 'N/A' && d.lunch === 'N/A') || 
                   (d.snack_completion === 0 && d.lunch_completion === 0 && d.water_completion === 0);
        }

        function renderSidebar() {
            const weeks = studentsData[selectedStudent];
            let html = `
                <div class="logo">
                    <img src="images/school-logo.jpg" alt="FuturON" class="logo-icon" style="object-fit:cover;">
                    <div><div class="logo-text">FuturON Preschool</div><div class="logo-sub">${isParentView ? 'Parent Portal' : 'Student Dashboard'}</div></div>
                </div>
            `;

            // Only show student list in admin mode (no ?student= param)
            if (!isParentView) {
                const students = Object.keys(studentsData);
                html += `<div class="nav-category">STUDENTS</div>`;
                students.forEach(s => {
                    html += `<div class="nav-item ${s === selectedStudent ? 'active' : ''}" onclick="selectStudent('${s}')">${s}</div>`;
                });
            } else {
                html += `<div class="nav-category">STUDENT</div>`;
                html += `<div class="nav-item active">${selectedStudent}</div>`;
            }

            html += `<div class="nav-category">TIME PERIOD</div>`;
            weeks.forEach((w, i) => {
                html += `<div class="nav-item ${i === selectedWeekIdx ? 'active' : ''}" onclick="selectWeek(${i})">${w.label}</div>`;
            });

            html += `<div style="margin-top:auto; padding-top:2rem; text-align:center;"><p style="font-size:0.65rem; color:#4b5563;">UKG Class | July 2026</p></div>`;
            document.getElementById('sidebar').innerHTML = html;
        }

        function renderMain() {
            const week = studentsData[selectedStudent][selectedWeekIdx];
            const days = getWeekDays(week);
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
            const daysPresent = days.filter(d => d.arrival_time !== 'N/A').length;
            const attendancePct = Math.round((daysPresent / days.length) * 100);
            const badgeClass = attendancePct >= 80 ? 'badge-green' : 'badge-yellow';
            const badgeText = attendancePct >= 80 ? 'EXCELLENT' : attendancePct >= 60 ? 'GOOD' : 'NEEDS ATTENTION';

            const studentInitial = selectedStudent.charAt(0);
            const studentNameFormatted = selectedStudent.charAt(0) + selectedStudent.slice(1).toLowerCase();

            let html = `
                <div class="school-banner">
                    <div class="school-banner-left">
                        <img src="images/school-logo.jpg" alt="FuturON" class="school-logo">
                        <div>
                            <div class="school-name">FuturON Preschool</div>
                            <div class="school-address">Near SBI Bank, Tadipatri Road, Jammalamadugu</div>
                        </div>
                    </div>
                    <div class="school-badge">
                        <div class="school-badge-class">UKG CLASS</div>
                        <div class="school-badge-date">July 2026</div>
                    </div>
                </div>
            `;

            // Mobile navigation (visible only on small screens)
            const weeks = studentsData[selectedStudent];
            const students = Object.keys(studentsData);
            let studentOpts = '';
            if (!isParentView) {
                students.forEach(s => { studentOpts += `<option value="${s}" ${s === selectedStudent ? 'selected' : ''}>${s.charAt(0) + s.slice(1).toLowerCase()}</option>`; });
            }
            let weekOpts = '';
            weeks.forEach((w, i) => { weekOpts += `<option value="${i}" ${i === selectedWeekIdx ? 'selected' : ''}>${w.label}</option>`; });
            html += `<div class="mobile-nav">`;
            if (!isParentView) html += `<select onchange="selectStudent(this.value)">${studentOpts}</select>`;
            html += `<select onchange="selectWeek(Number(this.value))">${weekOpts}</select>`;
            html += `</div>`;

            html += `
                <div class="header">
                    <div class="student-profile-card">
                        <img src="images/${selectedStudent}.jpg" alt="${studentNameFormatted}" class="student-avatar" onerror="this.outerHTML='<div class=student-avatar-placeholder>${studentInitial}</div>'">
                        <div class="student-profile-name">${studentNameFormatted}</div>
                    </div>
                    <div class="greeting-card">
                        <div class="greeting-title">${greeting}, ${studentNameFormatted}!</div>
                        <div class="greeting-subtitle">Week report: ${week.date_range || ''} | ${week.label}</div>
                        <div class="progress-line"></div>
                    </div>
                    <div class="health-card">
                        <div class="health-value">${attendancePct}</div>
                        <div class="health-label">Attendance %</div>
                        <span class="badge ${badgeClass}">${badgeText}</span>
                    </div>
                </div>
            `;

            html += renderOverview(days);

            html += `<div class="footer"><p>FuturON Preschool - Near SBI Bank, Tadipatri Road, Jammalamadugu</p><p style="margin-top:4px; color:#4b5563;">Student Daily Updates Dashboard | UKG Class | July 2026</p></div>`;
            document.getElementById('main').innerHTML = html;
        }

        function renderOverview(days) {
            const active = getActiveDays(days);
            const snackAvg = active.length ? active.reduce((s, d) => s + pct(d.snack_completion), 0) / active.length : 0;
            const lunchAvg = active.length ? active.reduce((s, d) => s + pct(d.lunch_completion), 0) / active.length : 0;
            const waterAvg = active.length ? active.reduce((s, d) => s + pct(d.water_completion), 0) / active.length : 0;
            const bottleTotal = active.reduce((s, d) => s + d.bottle_refill, 0);

            let html = `
                <div class="section-header">MEALS & HYDRATION</div>
                <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);">
                    <div class="kpi-card border-purple">
                        <div class="kpi-icon" style="background:rgba(139,92,246,0.15);"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg></div>
                        <div class="kpi-label">Snack Eaten</div><div class="kpi-value accent-purple">${Math.round(snackAvg)}%</div><div class="kpi-sublabel">How much snack your child finished</div>
                    </div>
                    <div class="kpi-card border-green">
                        <div class="kpi-icon" style="background:rgba(16,185,129,0.15);"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3"/><path d="M18 22V7"/></svg></div>
                        <div class="kpi-label">Lunch Eaten</div><div class="kpi-value accent-green">${Math.round(lunchAvg)}%</div><div class="kpi-sublabel">How much lunch your child finished</div>
                    </div>
                    <div class="kpi-card border-blue">
                        <div class="kpi-icon" style="background:rgba(59,130,246,0.15);"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg></div>
                        <div class="kpi-label">Water Drinking</div><div class="kpi-value accent-blue">${Math.round(waterAvg)}%</div><div class="kpi-sublabel">How well your child stayed hydrated</div>
                    </div>
                </div>
                <div class="section-header">ATTENDANCE & WATER BOTTLES</div>
                <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);">
                    <div class="kpi-card" style="border-left:4px solid #22c55e;">
                        <div class="kpi-icon" style="background:rgba(34,197,94,0.15);"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                        <div class="kpi-label">Days Present</div><div class="kpi-value" style="color:#22c55e;">${active.length}</div><div class="kpi-sublabel">Out of ${days.length} school days this week</div>
                    </div>
                    <div class="kpi-card" style="border-left:4px solid #ef4444;">
                        <div class="kpi-icon" style="background:rgba(239,68,68,0.15);"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
                        <div class="kpi-label">Days Absent</div><div class="kpi-value" style="color:#ef4444;">${days.length - active.length}</div><div class="kpi-sublabel">Missed school days this week</div>
                    </div>
                    <div class="kpi-card border-orange">
                        <div class="kpi-icon" style="background:rgba(245,158,11,0.15);"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h8l4 10H4L8 2z"/><path d="M12 12v6"/><path d="M8 22h8"/><path d="M12 18h0"/><circle cx="12" cy="18" r="2"/></svg></div>
                        <div class="kpi-label">Total Water Bottles</div><div class="kpi-value accent-orange">${bottleTotal + active.length}</div><div class="kpi-sublabel">${active.length} from home + ${bottleTotal} refilled</div>
                    </div>
                </div>
            `;

            // All students progress bars (only in admin/teacher mode)
            if (!isParentView) {
            html += `<div class="section-header">ALL STUDENTS - COMPLETION PROGRESS BARS</div><div class="student-progress">`;
            const weekLabel = studentsData[selectedStudent][selectedWeekIdx].label;
            Object.keys(studentsData).forEach(sname => {
                const sw = studentsData[sname].find(w => w.label === weekLabel);
                if (!sw) return;
                const sd = getWeekDays(sw);
                const sActive = getActiveDays(sd);
                if (!sActive.length) return;
                const sSnack = sActive.reduce((s, d) => s + pct(d.snack_completion), 0) / sActive.length;
                const sLunch = sActive.reduce((s, d) => s + pct(d.lunch_completion), 0) / sActive.length;
                const sWater = sActive.reduce((s, d) => s + pct(d.water_completion), 0) / sActive.length;
                const overall = Math.round((sSnack + sLunch + sWater) / 3);
                const isActive = sname === selectedStudent;
                html += `
                    <div class="student-row ${isActive ? 'active' : ''}">
                        <div class="student-header">
                            <span class="student-name" style="color:${isActive ? '#fff' : '#d1d5db'}">${sname.charAt(0) + sname.slice(1).toLowerCase()}</span>
                            <span class="student-overall">${overall}% overall</span>
                        </div>
                        <div class="bars-row">
                            <div class="bar-group"><div class="bar-label" style="color:#8b5cf6">Snacks ${Math.round(sSnack)}%</div><div class="bar-track"><div class="bar-fill" style="width:${sSnack}%; background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div></div></div>
                            <div class="bar-group"><div class="bar-label" style="color:#10b981">Lunch ${Math.round(sLunch)}%</div><div class="bar-track"><div class="bar-fill" style="width:${sLunch}%; background:linear-gradient(90deg,#10b981,#34d399)"></div></div></div>
                            <div class="bar-group"><div class="bar-label" style="color:#3b82f6">Water ${Math.round(sWater)}%</div><div class="bar-track"><div class="bar-fill" style="width:${sWater}%; background:linear-gradient(90deg,#3b82f6,#60a5fa)"></div></div></div>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            } // end if !isParentView

            // Daily snapshot
            html += `<div class="section-header">DAILY SNAPSHOT</div>`;
            html += `<div style="display:grid; grid-template-columns:1fr 1.5fr 1.5fr 1.5fr 1fr 1fr; gap:8px; padding:0.5rem 0; border-bottom:1px solid #1f2937; margin-bottom:0.3rem;">
                <span style="font-size:0.65rem; color:#6b7280; font-weight:600;">DAY / ARRIVAL</span>
                <span style="font-size:0.65rem; color:#6b7280; font-weight:600;">SNACKS / % COMPLETION</span>
                <span style="font-size:0.65rem; color:#6b7280; font-weight:600;">LUNCH / % COMPLETION</span>
                <span style="font-size:0.65rem; color:#6b7280; font-weight:600;">INTERESTED IN / WATER</span>
                <span style="font-size:0.65rem; color:#6b7280; font-weight:600;">BOTTLE REFILLED</span>
                <span style="font-size:0.65rem; color:#6b7280; font-weight:600;">UNIFORM</span>
            </div>`;
            days.forEach(d => {
                if (isAbsent(d)) {
                    html += `<div style="display:grid; grid-template-columns:1fr 5fr 1fr; gap:8px; padding:0.6rem 0; border-bottom:1px solid #111827; align-items:center;">
                        <div><div class="snap-day">${d.day}</div></div>
                        <div style="color:#6b7280; font-style:italic;">Absent</div>
                        <div><span class="badge badge-yellow">ABSENT</span></div>
                    </div>`;
                    return;
                }
                const sp = pct(d.snack_completion), lp = pct(d.lunch_completion), wp = pct(d.water_completion);
                const uniformBadge = d.uniform === 'YES' ? '<span class="badge badge-green">Uniform</span>' : d.uniform === 'NO' ? '<span class="badge badge-yellow">No</span>' : d.uniform.toUpperCase().includes('COLOUR') ? '<span class="badge badge-purple">Color Day</span>' : `<span class="badge badge-yellow">${d.uniform}</span>`;
                html += `
                    <div style="display:grid; grid-template-columns:1fr 1.5fr 1.5fr 1.5fr 1fr 1fr; gap:8px; padding:0.6rem 0; border-bottom:1px solid #111827; align-items:center;">
                        <div><div class="snap-day">${d.day}</div><div class="snap-time">${d.arrival_time}</div></div>
                        <div><div class="snap-value">${d.snacks}</div><div class="snap-bar"><div class="snap-bar-fill" style="width:${sp}%; background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div></div><div style="font-size:0.65rem; color:#8b5cf6; margin-top:2px;">${sp}% completed</div></div>
                        <div><div class="snap-value">${d.lunch}</div><div class="snap-bar"><div class="snap-bar-fill" style="width:${lp}%; background:linear-gradient(90deg,#10b981,#34d399)"></div></div><div style="font-size:0.65rem; color:#10b981; margin-top:2px;">${lp}% completed</div></div>
                        <div><div class="snap-value">${d.interested_in}</div><div style="font-size:0.65rem; color:#3b82f6; margin-top:4px;">Water: ${wp}%</div></div>
                        <div style="text-align:center;"><div style="font-size:1rem; font-weight:600; color:#f59e0b;">${d.bottle_refill}</div><div style="font-size:0.6rem; color:#6b7280;">bottles</div></div>
                        <div style="text-align:center;">${uniformBadge}</div>
                    </div>`;
            });

            // AI Insights - Weekly Summary
            const summary = AIEngine.generateWeeklySummary(selectedStudent, selectedWeekIdx);
            html += `<div class="ai-card">
                <div class="ai-card-header"><span style="font-size:1.2rem;">📝</span> WEEKLY SUMMARY</div>
                <div class="ai-summary-text">${summary}</div>
            </div>`;

            // AI Insights - Personalized Tips
            const tips = AIEngine.generateTips(selectedStudent, selectedWeekIdx);
            html += `<div class="ai-card">
                <div class="ai-card-header"><span style="font-size:1.2rem;">💡</span> PERSONALIZED TIPS</div>`;
            tips.forEach(t => {
                html += `<div class="ai-tip ai-severity-${t.severity}"><span class="ai-tip-icon">${t.icon}</span><span class="ai-tip-text">${t.text}</span></div>`;
            });
            html += `</div>`;

            // AI Insights - Anomaly Detection
            const anomalies = AIEngine.detectAnomalies(selectedStudent, selectedWeekIdx);
            html += `<div class="ai-card">
                <div class="ai-card-header"><span style="font-size:1.2rem;">🔍</span> ANOMALY DETECTION</div>`;
            if (anomalies.length === 0) {
                html += `<div class="ai-tip ai-severity-positive"><span class="ai-tip-icon">✅</span><span class="ai-tip-text">No anomalies detected. Everything looks normal this week.</span></div>`;
            } else {
                anomalies.forEach(a => {
                    html += `<div class="ai-tip ai-severity-${a.severity}"><span class="ai-tip-icon">${a.icon}</span><span class="ai-tip-text">${a.text}</span></div>`;
                });
            }
            html += `</div>`;

            // Teacher Recommendations (only in admin/teacher mode)
            if (!isParentView) {
            const recs = AIEngine.generateRecommendations(selectedWeekIdx);
            html += `<div class="ai-card">
                <div class="ai-card-header"><span style="font-size:1.2rem;">📋</span> TEACHER RECOMMENDATIONS <span class="ai-badge ai-badge-important" style="margin-left:8px;">${recs.length} items</span></div>`;
            recs.forEach(r => {
                html += `<div class="ai-rec ai-rec-${r.priority}">
                    <span style="font-size:1.1rem;">${r.icon}</span>
                    <div>
                        <span class="ai-badge ai-badge-${r.priority}">${r.priority}</span>
                        <div style="font-size:0.8rem; color:#d1d5db; margin-top:4px;">${r.text}</div>
                    </div>
                </div>`;
            });
            html += `</div>`;
            }

            return html;
        }





        function downloadPDF() {
            window.print();
        }

        function selectStudent(s) { selectedStudent = s; selectedWeekIdx = 0; render(); }
        function selectWeek(i) { selectedWeekIdx = i; render(); }

        function render() { renderSidebar(); renderMain(); }
        function renderApp() {
            isParentView = parentMode && studentsData[parentMode.toUpperCase()];
            selectedStudent = isParentView ? parentMode.toUpperCase() : Object.keys(studentsData)[0];
            selectedWeekIdx = 0;
            render();
        }

        // Load live data from Google Sheets, then render
        render(); // Show immediately with fallback data
        loadData(); // Fetch live data and re-render
    </script>
</body>
</html>
